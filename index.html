<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Cozinha Renan & Laislla</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Inter',sans-serif;
background:#f7f5f1;
color:#2f3a36;
}

h1,h2 {
font-family:'Playfair Display',serif;
}

.hero {
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(135deg,#2f6f62,#d58a63);
color:white;
}

.hero h1 {
font-size:70px;
margin:0;
}

.hero p {
font-size:20px;
}

section {
padding:60px 20px;
max-width:1000px;
margin:auto;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card {
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
text-align:center;
}

.card img {
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
}

.btn {
background:#d58a63;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<div class="hero">
<div>
<h1>Renan & Laislla</h1>
<p>Chá de Cozinha • 02/05/2026 • 14h</p>
</div>
</div>

<section>
<h2>Lista de Presentes</h2>

<div class="grid" id="lista"></div>

</section>

<script>

const presentes = [

{nome:"Potes herméticos", valor:89, img:"https://images.unsplash.com/photo-1584269600464-37b1b58a9fe7"},
{nome:"Assadeira de vidro", valor:119, img:"https://images.unsplash.com/photo-1600566752355-35792bedcfea"},
{nome:"Forma de bolo", valor:49, img:"https://images.unsplash.com/photo-1464306076886-da185f6a9d05"},
{nome:"Utensílios silicone", valor:79, img:"https://images.unsplash.com/photo-1506368083636-6defb67639a7"},
{nome:"Bule de café", valor:59, img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"},
{nome:"Escorredor", valor:34, img:"https://images.unsplash.com/photo-1473093295043-cdd812d0e601"},
{nome:"Ralador", valor:27, img:"https://images.unsplash.com/photo-1452195100486-9cc805987862"},
{nome:"Tábua de corte", valor:39, img:"https://images.unsplash.com/photo-1504674900247-0877df9cc836"},
{nome:"Jarra", valor:44, img:"https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd"},
{nome:"Escorredor louça", valor:79, img:"https://images.unsplash.com/photo-1506368249639-73a05d6f6488"}

];

const lista = document.getElementById("lista");

presentes.forEach(p => {
lista.innerHTML += `
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.valor}</p>
<button class="btn">Presentear</button>
</div>
`;
});

</script>

</body>
</html>
