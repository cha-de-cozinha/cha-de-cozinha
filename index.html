<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Cozinha Renan & Laislla</title>

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* ===== FUNDO ===== */
body{
  background: linear-gradient(135deg, #f7f3ed, #e9dfd2);
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.4)),
    url("imagens/convite.jpeg") center/cover no-repeat;
  z-index:-1;
}

.hero h1{
  font-size:50px;
}

.hero p{
  margin-top:10px;
  font-size:20px;
}

/* ===== SEÇÕES ===== */
section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  margin-bottom:40px;
}

/* ===== CASAL ===== */
.casal img{
  width:100%;
  max-width:350px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
  transition:0.3s;
}

.casal img:hover{
  transform:scale(1.03);
}

/* ===== LOCAL ===== */
.local{
  height:300px;
  border-radius:20px;
  background:
    linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.1)),
    url("imagens/local.jpeg") center/cover no-repeat;
}

/* ===== PRESENTES ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:15px;
  padding:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  background:black;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.card button:disabled{
  background:gray;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Chá de Cozinha</h1>
    <p>Renan & Laislla</p>
  </div>
</div>

<!-- CASAL -->
<section>
  <div class="box casal">
    <h2>O Casal</h2>
    <br>
    <img src="imagens/casal.jpeg">
  </div>
</section>

<!-- LOCAL -->
<section>
  <div class="box">
    <h2>Local</h2>
    <br>
    <div class="local"></div>
  </div>
</section>

<!-- PRESENTES -->
<section>
  <div class="box">
    <h2>Lista de Presentes</h2>
    <br>

    <div class="grid" id="lista"></div>

  </div>
</section>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyArsliiGlgSiE2JdnbfdjmnXEoKVwN90fc",
  authDomain: "cha-cozinha-renan-laislla.firebaseapp.com",
  projectId: "cha-cozinha-renan-laislla",
  storageBucket: "cha-cozinha-renan-laislla.firebasestorage.app",
  messagingSenderId: "786490450244",
  appId: "1:786490450244:web:a13827f17458bac7177711"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const docRef = doc(db, "listasPresentes", "renan-laislla-cha-cozinha");

const presentes = [
  "Assadeiras de vidro",
  "Vasilhas plásticas e potes herméticos",
  "Forma de bolo"
];

async function carregar(){

  const snap = await getDoc(docRef);
  const dados = snap.data().escolhas || {};

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  presentes.forEach(nome => {

    const escolhido = dados[nome];

    lista.innerHTML += `
      <div class="card">
        <h3>${nome}</h3>
        <p>${escolhido ? "Escolhido por: " + escolhido : "Disponível"}</p>
        <button ${escolhido ? "disabled" : ""} onclick="escolher('${nome}')">
          ${escolhido ? "Indisponível" : "Escolher presente"}
        </button>
      </div>
    `;
  });
}

window.escolher = async function(nome){

  const pessoa = prompt("Digite seu nome:");

  if(!pessoa) return;

  if(!confirm("Após confirmar, não poderá alterar. Deseja continuar?")) return;

  const snap = await getDoc(docRef);
  const dados = snap.data().escolhas || {};

  if(dados[nome]){
    alert("Esse presente já foi escolhido!");
    return;
  }

  dados[nome] = pessoa;

  await updateDoc(docRef, { escolhas: dados });

  carregar();
}

carregar();

</script>

</body>
</html>
