<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chá de Cozinha - Renan & Laislla</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin:0; background:#fafafa; }
    header { background:#111; color:#fff; padding:20px; text-align:center; }
    h1 { margin:0; }
    .container { max-width:1000px; margin:auto; padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }
    .card { background:#fff; border-radius:12px; padding:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    .card img { width:100%; border-radius:10px; }
    .price { font-weight:bold; margin:10px 0; }
    button { background:#000; color:#fff; border:none; padding:10px; border-radius:8px; cursor:pointer; }
    button:hover { background:#333; }
    .cotas { margin-top:10px; }
    footer { text-align:center; padding:20px; font-size:14px; }
  </style>
</head>
<body>

<header>
  <h1>Chá de Cozinha</h1>
  <p>Renan & Laislla</p>
</header>

<div class="container">

  <h2>Lista de Presentes</h2>

  <div class="grid">

    <!-- GELADEIRA (COTAS) -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
      <h3>Geladeira Premium</h3>
      <p class="price">Valor total: R$ 10.000</p>
      <div class="cotas">
        <p>Compre uma cota:</p>
        <button onclick="comprarCota(100)">R$ 100</button>
        <button onclick="comprarCota(200)">R$ 200</button>
        <button onclick="comprarCota(500)">R$ 500</button>
      </div>
    </div>

    <!-- AIRFRYER -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
      <h3>Air Fryer</h3>
      <p class="price">R$ 400</p>
      <button onclick="comprar(400)">Presentear</button>
    </div>

    <!-- LIQUIDIFICADOR -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1586201375754-8c4d4c6f4d1d">
      <h3>Liquidificador</h3>
      <p class="price">R$ 250</p>
      <button onclick="comprar(250)">Presentear</button>
    </div>

  </div>

</div>

<footer>
  Obrigado por fazer parte desse momento ❤️
</footer>

<script>
function comprar(valor) {
  alert('Pagamento de R$ ' + valor + ' iniciado (simulação).');
}

function comprarCota(valor) {
  alert('Você escolheu uma cota de R$ ' + valor + ' (simulação).');
}
</script>

</body>
</html>
